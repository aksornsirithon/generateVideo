name: Video Generator - Replicate

on:
  # รันมือได้เพื่อทดสอบก่อน
  workflow_dispatch:

  # เปิด schedule เมื่อพร้อม (ตี 2 เวลาไทย)
  # schedule:
  #   - cron: '0 19 * * *'

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install -r requirements_replicate.txt

      - name: 📁 Create logs directory
        run: mkdir -p logs

      - name: 🎬 Generate Video with Replicate
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          GDRIVE_PROMPT_FOLDER_ID: ${{ secrets.GDRIVE_PROMPT_FOLDER_ID }}
          GDRIVE_OUTPUT_FOLDER_ID: ${{ secrets.GDRIVE_OUTPUT_FOLDER_ID }}
          GDRIVE_CREDENTIALS_JSON: ${{ secrets.GDRIVE_CREDENTIALS_JSON }}
        run: python generate_replicate.py

      - name: 📤 Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-replicate-${{ github.run_number }}
          path: logs/
          retention-days: 7
